site_name: iOS Engineering Preparation Kit
site_description: Senior, Staff, and Principal iOS engineering preparation notes
site_url: https://melancholygaze13.github.io/preparation-kit/
repo_url: https://github.com/melancholygaze13/preparation-kit
repo_name: melancholygaze13/preparation-kit
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site
strict: true

theme:
  name: material
  language: en
  font: false
  icon:
    logo: material/apple
    repo: fontawesome/brands/github
  features:
    - content.code.copy
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search

extra_css:
  - stylesheets/extra.css
